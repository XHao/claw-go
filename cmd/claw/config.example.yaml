# claw-go config
#
# Copy to ~/.claw/config.yaml and fill in your api_key.
# Required: models + primary_model.

# ---- Models (required) ----
models:
  default_task:
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o-mini"
    system_prompt: |
      You are a helpful assistant running on {os} ({arch}).
      User: {user}  Home: {home}  Cwd: {cwd}  Shell: {shell}  Date: {date}
      Be concise and prefer concrete steps.
    max_tokens: 4096

primary_model: "default_task"

# ---- Optional auto routing ----
# routing_policy:
#   routing_model: "default_task"
#   task_model:    "default_task"
#   summary_model: "default_task"
#   thinking_model: "default_task"
#   thinking_keywords:
#     - "重构"
#     - "架构"
#     - "trade-off"

# Example: add a Claude thinking tier
# models:
#   claude_think:
#     base_url: "https://your-proxy/v1"
#     api_key: "${ANTHROPIC_API_KEY}"
#     model: "aws.claude-sonnet-4.6"
#     max_tokens: 16000
#     thinking_budget: 10240   # enables extended thinking
#     timeout_seconds: 180
# routing_policy:
#   thinking_model: "claude_think"

# ---- CLI ----
cli:
  prompt: "You ❯ "
  shell_enabled: true
  shell_timeout_seconds: 300

# ---- Tools ----
tools:
  enabled: false
  max_iterations: 20
  # allowed restricts which built-in tools the LLM may use (tool name whitelist).
  # nil/empty means all built-in tools are available.
  #allowed: [bash, inspect_file, read_file, search_file, write_file, list_files]
  # bash_allowed_commands restricts which shell commands the bash tool may execute.
  # nil/empty means all commands are permitted.
  #bash_allowed_commands: [git, go, npm]
  #bash_timeout_seconds: 30
  # Note:
  # - fetch_url is a core registered tool and is available when tools.enabled=true.
  # - web_search requires search.tavily_api_key (see below).

# ---- Web Search (Tavily) ----
# Obtain a free API key at https://app.tavily.com
# When tavily_api_key is set, web_search becomes available to the LLM.
# fetch_url does not require Tavily and can fetch/analyze a known URL directly.
#search:
#  tavily_api_key: "tvly-xxxxxxxxxxxxxxxxxxxxxxxx"
#  max_results: 5        # number of results returned per query (default 5)
#  timeout_seconds: 15   # HTTP request timeout in seconds (default 15)

# ---- DingTalk Channel (钉钉) ----
# Uses DingTalk Stream API (WebSocket) — no public HTTP server required.
# 1. Create an app at https://open.dingtalk.com/
# 2. Enable "Robot" capability and configure message receive mode as "Stream"
# 3. Copy AppKey → client_id, AppSecret → client_secret
#dingtalk:
#  enabled: true
#  client_id: "dingxxxxxxxxxxxxxxxx"      # AppKey
#  client_secret: "xxxxxxxxxxxxxxxx"      # AppSecret

# ---- Logs ----
log:
  debug_llm: false
  metrics_enabled: false
